name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [development, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: pnpm typecheck

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: pnpm build

  migrate:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hookman
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: hookman
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://hookman:secret@localhost:5432/hookman
      - run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://hookman:secret@localhost:5432/hookman