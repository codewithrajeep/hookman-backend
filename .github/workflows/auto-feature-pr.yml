name: Auto Feature PR to development

on:
  push:
    branches:
      - 'feature/**'

jobs:
  open-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Extract branch info
        id: info
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          FEATURE="${BRANCH#feature/}"
          TITLE="feat: ${FEATURE//-/ }"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Create PR to development
        run: |
          gh pr create \
            --base development \
            --head "${{ steps.info.outputs.branch }}" \
            --title "${{ steps.info.outputs.title }}" \
            --body "## Summary
          Auto-generated PR for \`${{ steps.info.outputs.branch }}\`

          ## Checklist
          - [ ] CI passes
          - [ ] Code reviewed
          - [ ] Ready to merge into development" \
            --repo ${{ github.repository }} || echo "PR already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}