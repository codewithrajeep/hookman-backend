opencollection: 1.0.0

info:
  name: hookman-backend
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body && body.data && body.data.token) {
          bru.setEnvVar("token", body.data.token)
        }
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
